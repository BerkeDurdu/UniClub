name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests + 90% coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: uniclub-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "bcrypt==4.0.1"
      - name: Run pytest with coverage
        env:
          SECRET_KEY: "ci-secret-key-for-testing"
          DATABASE_URL: "sqlite:///:memory:"
          APP_ENV: "test"
          DEBUG: "false"
        run: |
          pytest --cov --cov-report=xml --cov-report=term

  frontend-unit:
    name: Frontend unit tests + 90% coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: uniclub-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: uniclub-web/package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npm run build

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs: [backend, frontend-unit]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: uniclub_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: uniclub-web/package-lock.json

      - name: Install backend deps
        working-directory: uniclub-api
        run: |
          pip install -r requirements.txt
          pip install "bcrypt==4.0.1"

      - name: Start backend
        working-directory: uniclub-api
        env:
          SECRET_KEY: "ci-secret-key-for-testing"
          DATABASE_URL: "postgresql+psycopg://postgres:password@localhost:5432/uniclub_db"
          APP_ENV: "test"
          DEBUG: "false"
          SEED_ADMIN_PASSWORD: "Admin#12345"
        run: |
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 8000 &
          # wait for /health
          for i in $(seq 1 30); do
            if curl -fs http://127.0.0.1:8000/health; then break; fi
            sleep 1
          done

      - name: Install frontend deps and build
        working-directory: uniclub-web
        run: |
          npm ci
          echo "VITE_API_BASE_URL=http://127.0.0.1:8000" > .env
          npm run build

      - name: Install Playwright browsers
        working-directory: uniclub-web
        run: npx playwright install --with-deps chromium

      - name: Start frontend preview
        working-directory: uniclub-web
        run: |
          nohup npx vite preview --host 127.0.0.1 --port 5173 &
          for i in $(seq 1 30); do
            if curl -fs http://127.0.0.1:5173/; then break; fi
            sleep 1
          done

      - name: Run Playwright tests
        working-directory: uniclub-web
        env:
          E2E_BASE_URL: "http://127.0.0.1:5173"
          SEED_ADMIN_PASSWORD: "Admin#12345"
        run: npx playwright test
